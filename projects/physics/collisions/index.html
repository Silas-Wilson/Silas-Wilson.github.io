<!DOCTYPE html>
<html>
<head>
  <title>Collisions</title>
</head>
<body>
  <h1>Particle Collisions</h1>
  <p>Click and drag to spawn particles and give velocity</p>
  <!-- CANVAS -->
  <div>
    <canvas id="canvas"></canvas>
  </div>

  <!-- SETTINGS / VISIBLE INPUT -->
  <div>
    <label>
      <input type="checkbox" id="togglePause">
      Pause
    </label>
    <label>
      <input type="checkbox" id="toggleVectors">
      Vectors
    </label>
    <label>
      <input type="range" id="vectorScale", min="0", max="1", step="0.01">
      Vector Scale
    </label>
  </div>
  
  <!-- SIMULATION INPUT -->
  <div>
    <label>
      <input type="range" id="gravityStrength", min="0", max="1", step="0.01">
      Gravity Strength
    </label>
    <label>
      <input type="range" id="elasticity", min="0", max="1", step="0.01">
      Elasticity
    </label>
  </div>

  <!-- MAIN SCRIPT -->
  <script type="module" src="script.js"></script>
  <!-- INPUT SCRIPT -->
  <script type="module" src="inputHandler.js"></script>
</body>
</html>

<!--CSS STUFF-->
<style>
  canvas {
    border: 2px solid black;
  }
</style>
